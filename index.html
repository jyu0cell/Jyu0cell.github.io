<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大学生个人主页</title>
    <!-- Font Awesome 图标库 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            background: #0b0e14;
            color: #e8edf5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            /* 深色渐变背景 */
            background: radial-gradient(circle at 20% 30%, #141b26, #0a0d12 80%);
        }

        /* ===== 主卡片容器 ===== */
        .profile-card {
            max-width: 880px;
            width: 100%;
            background: rgba(20, 28, 40, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2.8rem 2.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.04);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* ===== 头部：头像 + 姓名 ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 1.8rem;
            flex-wrap: wrap;
            margin-bottom: 2.2rem;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6);
            background: #1f2a38;
            flex-shrink: 0;
            transition: transform 0.25s ease, border-color 0.25s;
        }

        .avatar:hover {
            transform: scale(1.03);
            border-color: #6c8cff;
        }

        .name-title h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #f0f4ff, #b6cbff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .name-title .badge {
            display: inline-block;
            margin-top: 0.3rem;
            font-size: 1rem;
            font-weight: 500;
            color: #a0b8e0;
            background: rgba(108, 140, 255, 0.15);
            padding: 0.25rem 1rem;
            border-radius: 40px;
            border: 1px solid rgba(108, 140, 255, 0.2);
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
        }

        /* ===== 简介 ===== */
        .bio {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #ccd9f0;
            margin-bottom: 2.5rem;
            padding: 0.2rem 0;
            border-left: 3px solid #6c8cff;
            padding-left: 1.2rem;
            background: linear-gradient(90deg, rgba(108, 140, 255, 0.06), transparent);
            border-radius: 0 8px 8px 0;
        }

        .bio strong {
            color: #b6cbff;
            font-weight: 600;
        }

        /* ===== 项目卡片网格 ===== */
        .projects-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #d6e2ff;
        }

        .projects-title i {
            color: #6c8cff;
            font-size: 1.4rem;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 1.6rem;
            margin-bottom: 2.8rem;
        }

        .project-card {
            background: rgba(28, 38, 54, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 1.6rem;
            padding: 1.5rem 1.4rem 1.6rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.25s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(108, 140, 255, 0.25);
        }

        .project-icon {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: #6c8cff;
        }

        .project-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #eef3ff;
        }

        .project-card p {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #b0c4e8;
            margin-bottom: 0.8rem;
            flex: 1;
        }

        .project-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            color: #8aa4dd;
            background: rgba(108, 140, 255, 0.12);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            align-self: flex-start;
            border: 1px solid rgba(108, 140, 255, 0.1);
        }

        /* ===== 底部社交图标 ===== */
        .social-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.8rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
        }

        .social-footer a {
            color: #9ab0dd;
            font-size: 1.8rem;
            transition: color 0.2s, transform 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            opacity: 0.75;
        }

        .social-footer a:hover {
            color: #ffffff;
            transform: scale(1.15);
            opacity: 1;
        }

        .social-footer a .fa-github:hover {
            color: #f0f6ff;
        }
        .social-footer a .fa-bilibili:hover {
            color: #fb7299;
        }
        .social-footer a .fa-weixin:hover {
            color: #07c160;
        }
        .social-footer a .fa-envelope:hover {
            color: #f7c948;
        }
        .social-footer a .fa-qq:hover {
            color: #12b7f5;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .profile-card {
                padding: 1.8rem 1.2rem;
                border-radius: 1.8rem;
            }
            .header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 0.8rem;
            }
            .avatar {
                width: 90px;
                height: 90px;
            }
            .name-title h1 {
                font-size: 2rem;
            }
            .bio {
                font-size: 1rem;
                padding-left: 0.8rem;
            }
            .projects-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .social-footer {
                gap: 1.4rem;
            }
            .social-footer a {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 400px) {
            .profile-card {
                padding: 1.2rem 0.8rem;
            }
            .name-title h1 {
                font-size: 1.7rem;
            }
            .project-card {
                padding: 1.2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="profile-card">

        <!-- ===== 头部 ===== -->
        <div class="header">
            <!-- 头像 (替换为自己的图片链接) -->
            <img class="avatar"
            src="https://api.dicebear.com/9.x/avataaars/svg?seed=student&backgroundColor=1f2a38"
            alt="头像"
            />
            <div class="name-title">
                <h1>张 逸 轩</h1>
                <span class="badge"><i class="fas fa-graduation-cap" style="margin-right: 6px;"></i>计算机科学与技术 · 大三</span>
            </div>
        </div>

        <!-- ===== 简介 ===== -->
        <div class="bio">
            <i class="fas fa-quote-left" style="color: #6c8cff; margin-right: 6px; opacity: 0.6;"></i>
            你好！我是 <strong>逸轩</strong>，一名热爱全栈开发与开源技术的大学生。
            喜欢用代码构建有趣的项目，目前正在探索 AI 与 Web 的交汇点。
            相信“学以致用，行稳致远”。
        </div>

        <!-- ===== 项目区标题 ===== -->
        <div class="projects-title">
            <i class="fas fa-code"></i> 精选项目
        </div>

        <!-- ===== 三个项目卡片 ===== -->
        <div class="projects-grid">

            <!-- 项目 1 -->
            <div class="project-card">
                <div class="project-icon"><i class="fas fa-cloud-sun"></i></div>
                <h3>天气小站</h3>
                <p>基于 Vue 3 + 高德 API 的实时天气查询，支持多城市切换与 7 日趋势。</p>
                <span class="project-tag"><i class="fas fa-tag" style="margin-right: 4px;"></i> Vue · API</span>
            </div>

            <!-- 项目 2 -->
            <div class="project-card">
                <div class="project-icon"><i class="fas fa-robot"></i></div>
                <h3>智能笔记助手</h3>
                <p>Flask + 通义千问 API 实现语音转文字 & 自动摘要，让记录更高效。</p>
                <span class="project-tag"><i class="fas fa-tag" style="margin-right: 4px;"></i> Python · AI</span>
            </div>

            <!-- 项目 3 -->
            <div class="project-card">
                <div class="project-icon"><i class="fas fa-gamepad"></i></div>
                <h3>迷宫探险</h3>
                <p>用 Canvas + JavaScript 开发的迷宫小游戏，支持键盘与触控，锻炼逻辑思维。</p>
                <span class="project-tag"><i class="fas fa-tag" style="margin-right: 4px;"></i> JS · Canvas</span>
            </div>

        </div>

        <!-- ===== 底部社交图标 ===== -->
        <div class="social-footer">
            <a href="#" target="_blank" aria-label="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="#" target="_blank" aria-label="B站">
                <i class="fab fa-bilibili"></i>
            </a>
            <a href="#" target="_blank" aria-label="微信">
                <i class="fab fa-weixin"></i>
            </a>
            <a href="#" target="_blank" aria-label="邮箱">
                <i class="fas fa-envelope"></i>
            </a>
            <a href="#" target="_blank" aria-label="QQ">
                <i class="fab fa-qq"></i>
            </a>
        </div>

    </div>
</body>
</html>
